<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ego On Top</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 18% 20%, rgba(138, 44, 255, 0.22), transparent 28%),
        radial-gradient(circle at 82% 52%, rgba(140, 33, 255, 0.32), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(156, 39, 255, 0.28), transparent 22%),
        linear-gradient(180deg, #07040d 0%, #090410 48%, #040307 100%);
      overflow-x: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 34%;
      background-image:
        linear-gradient(rgba(157, 62, 255, 0.20) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157, 62, 255, 0.18) 1px, transparent 1px);
      background-size: 58px 58px;
      transform: perspective(600px) rotateX(58deg) scale(1.6);
      transform-origin: bottom;
      opacity: 0.55;
      pointer-events: none;
      filter: blur(0.2px);
    }

    header {
      width: 100%;
      max-width: 1480px;
      margin: auto;
      padding: 28px 44px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      z-index: 2;
    }

    .logo {
      font-size: 64px;
      font-weight: 1000;
      color: #ff78ff;
      text-shadow: 0 0 12px #ff78ff, 0 0 34px rgba(201, 61, 255, 0.9);
      letter-spacing: -4px;
    }

    nav {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: #f1e8ff;
      padding: 14px 18px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
      opacity: 0.9;
    }

    nav a.active {
      background: rgba(142, 43, 255, 0.16);
      border: 1px solid rgba(204, 103, 255, 0.3);
    }

    .icons {
      display: flex;
      gap: 14px;
    }

    .icon-btn {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      box-shadow: inset 0 0 18px rgba(255,255,255,0.03);
      font-size: 23px;
    }

    .hero {
      width: 100%;
      max-width: 1480px;
      margin: 70px auto 0;
      padding: 0 44px;
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      align-items: center;
      gap: 72px;
      position: relative;
      z-index: 2;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 13px;
      padding: 15px 28px;
      border-radius: 16px;
      background: rgba(124, 24, 214, 0.20);
      border: 1px solid rgba(184, 61, 255, 0.7);
      color: #ffffff;
      font-weight: 900;
      font-size: 18px;
      margin-bottom: 28px;
      box-shadow: 0 0 24px rgba(162, 47, 255, 0.35), inset 0 0 22px rgba(255,255,255,0.025);
    }

    .tag span {
      color: #ffc04b;
      font-size: 26px;
    }

    h1 {
      font-size: clamp(68px, 8vw, 126px);
      line-height: 0.88;
      font-weight: 1000;
      letter-spacing: -7px;
      margin-bottom: 34px;
    }

    h1 .purple {
      background: linear-gradient(180deg, #8d42ff 0%, #7d2aff 42%, #d85aff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 32px rgba(164, 55, 255, 0.18);
    }

    .subtitle {
      max-width: 560px;
      color: rgba(255,255,255,0.86);
      font-size: 22px;
      line-height: 1.55;
      margin-bottom: 38px;
    }

    .buttons {
      display: flex;
      align-items: center;
      gap: 34px;
      flex-wrap: wrap;
    }

    .btn {
      color: white;
      text-decoration: none;
      padding: 20px 30px;
      border-radius: 12px;
      font-size: 20px;
      font-weight: 1000;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .btn-discord {
      background: linear-gradient(135deg, #9a25ff, #b538ff);
      box-shadow: 0 0 30px rgba(175, 56, 255, 0.75);
    }

    .preview-link-btn {
      color: #db80ff;
      font-weight: 1000;
      font-size: 22px;
      text-decoration: underline;
      text-underline-offset: 9px;
      text-decoration-thickness: 2px;
    }

    .preview-wrap {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .preview {
      width: 100%;
      max-width: 760px;
      padding: 32px;
      border-radius: 24px;
      background: rgba(13, 10, 21, 0.88);
      border: 2px solid rgba(205, 70, 255, 0.9);
      box-shadow:
        0 0 28px rgba(190, 57, 255, 0.85),
        0 35px 100px rgba(109, 25, 255, 0.35),
        inset 0 0 30px rgba(255,255,255,0.03);
    }

    .preview video {
      width: 100%;
      display: block;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 20px 60px rgba(0,0,0,0.55);
      background: #050509;
    }

    .features {
      width: calc(100% - 88px);
      max-width: 1480px;
      margin: 70px auto 40px;
      padding: 26px 52px;
      border-radius: 24px;
      background: rgba(13, 10, 21, 0.72);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 20px 80px rgba(0,0,0,0.32), inset 0 0 30px rgba(255,255,255,0.02);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      position: relative;
      z-index: 2;
    }

    .feature {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 22px;
      align-items: center;
      padding-right: 26px;
    }

    .feature:not(:last-child) {
      border-right: 1px solid rgba(255,255,255,0.13);
    }

    .feature-icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 36px;
      color: #d45cff;
      background: radial-gradient(circle, rgba(147, 42, 255, 0.45), rgba(83, 19, 128, 0.45));
      box-shadow: 0 0 32px rgba(164, 47, 255, 0.36);
    }

    .feature h3 {
      font-size: 19px;
      margin-bottom: 8px;
    }

    .feature p {
      color: rgba(255,255,255,0.76);
      font-size: 17px;
      line-height: 1.45;
    }

    .preview-page {
      display: none;
      min-height: calc(100vh - 120px);
      background:
        radial-gradient(circle at 25% 30%, rgba(170, 70, 255, 0.45), transparent 30%),
        radial-gradient(circle at 80% 60%, rgba(120, 55, 220, 0.45), transparent 28%),
        linear-gradient(180deg, #170820 0%, #08040f 100%);
      position: relative;
      z-index: 2;
    }

    body.preview-open .hero {
      display: none;
    }

    body.preview-open .preview-page {
      display: block;
    }

    @media (max-width: 950px) {
      header {
        padding: 24px 22px 8px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 0 22px;
        margin-top: 36px;
      }

      h1 {
        font-size: 78px;
      }

      .features {
        width: calc(100% - 44px);
        grid-template-columns: 1fr;
        padding: 28px;
      }

      .feature:not(:last-child) {
        border-right: 0;
        border-bottom: 1px solid rgba(255,255,255,0.13);
        padding-bottom: 22px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">E</div>

    

    
  </header>

  <main class="hero">
    <section>
      

      <h1>
        Ego <span class="purple">On</span><br>
        <span class="purple">Top</span>
      </h1>

      <p class="subtitle">
        Je suis un jeune developer avec beaucoup de talent mais mon talent se trouve entre mes main pour le voir dm moi sur discord
      </p>

      <div class="buttons">
        <a class="btn btn-discord" href="https://discord.com/users/1347299015842070621" target="_blank">☯ My Discord</a>
        <a class="preview-link-btn" href="#preview-page" onclick="showPreviewPage()">Voir les preview →</a>
      </div>
    </section>

    <section class="preview-wrap" id="preview">
      <div class="preview">
        <video autoplay muted loop playsinline controls>
          <source src="videoplayback.mp4" type="video/mp4">
        </video>
      </div>
    </section>
  </main>

  

  <section class="preview-page" id="preview-page"></section>

  <audio id="startupSound" autoplay>
    <source src="videoplayback (1).mp3" type="audio/mpeg">
  </audio>

  <script>
    window.addEventListener('load', () => {
      const sound = document.getElementById('startupSound');

      sound.volume = 1;

      const playPromise = sound.play();

      if (playPromise !== undefined) {
        playPromise.catch(() => {
          document.body.addEventListener('click', () => {
            sound.play();
          }, { once: true });
        });
      }
    });


    function showPreviewPage() {
      document.body.classList.add('preview-open');

      document.querySelectorAll('nav a').forEach(link => {
        link.classList.remove('active');
      });

      document.querySelector('.preview-link').classList.add('active');
    }

    function showHomePage() {
      document.body.classList.remove('preview-open');

      document.querySelectorAll('nav a').forEach(link => {
        link.classList.remove('active');
      });

      document.querySelector('nav a').classList.add('active');
    }

    if (window.location.hash === '#preview-page') {
      showPreviewPage();
    }
  </script>
</body>
</html>
