<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landing Page</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 35%, rgba(140, 55, 210, 0.45), transparent 28%),
        radial-gradient(circle at 85% 48%, rgba(128, 68, 230, 0.45), transparent 25%),
        linear-gradient(180deg, #13071d 0%, #08040f 55%, #050309 100%);
      overflow-x: hidden;
    }

    .top-line {
      height: 3px;
      background: #281238;
      box-shadow: 0 0 20px rgba(177, 88, 255, 0.5);
    }

    header {
      width: 100%;
      max-width: 1180px;
      margin: auto;
      padding: 28px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 48px;
      font-weight: 900;
      line-height: 1;
      color: #ff7cf5;
      text-shadow: 0 0 18px rgba(255, 124, 245, 0.8);
      transform: none;
    }

    nav {
      display: flex;
      gap: 18px;
      background: rgba(0, 0, 0, 0.15);
      padding: 6px;
      border-radius: 12px;
    }

    nav a {
      text-decoration: none;
      color: #ddd5e8;
      padding: 12px 18px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 15px;
    }

    nav a.active {
      background: #160027;
      color: white;
    }

    .icons {
      display: flex;
      gap: 18px;
      color: #d8d2e2;
      font-size: 20px;
    }

    .hero {
      width: 100%;
      max-width: 1180px;
      margin: 60px auto 0;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 60px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 13px 22px;
      border-radius: 999px;
      background: rgba(142, 72, 210, 0.28);
      border: 1px solid rgba(196, 113, 255, 0.55);
      color: #d7baff;
      font-weight: 800;
      margin-bottom: 28px;
      box-shadow: inset 0 0 20px rgba(255,255,255,0.03);
    }

    .tag span {
      color: #ffad42;
    }

    h1 {
      font-size: clamp(52px, 7vw, 86px);
      line-height: 0.98;
      font-weight: 1000;
      letter-spacing: -4px;
      margin-bottom: 24px;
    }

    h1 .purple {
      color: #c883ff;
      text-shadow: 0 0 20px rgba(185, 98, 255, 0.35);
    }

    .subtitle {
      color: #c5b8d4;
      font-size: 18px;
      line-height: 1.7;
      max-width: 600px;
      margin-bottom: 32px;
    }

    .buttons {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      color: white;
      padding: 18px 28px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .btn-main {
      background: linear-gradient(135deg, #9f44ff, #7e36e8);
      box-shadow: 0 0 30px rgba(151, 69, 255, 0.55);
    }

    .btn-second {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .preview-wrap {
      position: relative;
      min-height: 430px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preview {
      width: 100%;
      max-width: 560px;
      padding: 28px;
      border-radius: 28px;
      background: rgba(10, 8, 16, 0.88);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 25px 80px rgba(0,0,0,0.55);
    }

    .fake-app {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 14px;
      height: 330px;
      background: #111;
      padding: 14px;
    }

    .sidebar {
      background: #171717;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding-top: 18px;
      color: #aaa;
    }

    .sidebar .mark {
      font-size: 28px;
      font-weight: 1000;
      color: white;
      margin-bottom: 15px;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .bar {
      height: 64px;
      background: #181818;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      color: #cfcfcf;
      font-weight: 700;
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d88cff, #8e42ff);
    }

    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      flex: 1;
    }

    .panel {
      background: #191919;
      border-radius: 8px;
      padding: 18px;
      color: #bfbfbf;
      font-size: 13px;
    }

    .line {
      height: 4px;
      background: #a65cff;
      border-radius: 10px;
      margin: 14px 0;
      box-shadow: 0 0 12px rgba(166, 92, 255, 0.7);
    }

    .small-card {
      position: absolute;
      background: #120d1d;
      border: 1px solid rgba(177, 89, 255, 0.55);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .small-card strong {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
    }

    .small-card p {
      color: #c5a7ff;
      font-size: 12px;
      font-weight: 700;
    }

    .card-one {
      top: 20px;
      left: 20px;
    }

    .card-two {
      right: 0;
      bottom: 70px;
    }

    .bottom-tag {
      width: max-content;
      margin: 100px auto 30px;
      padding: 10px 18px;
      border-radius: 999px;
      background: rgba(142, 72, 210, 0.22);
      border: 1px solid rgba(196, 113, 255, 0.55);
      color: #d7baff;
      font-weight: 900;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        margin-top: 25px;
      }

      header {
        flex-wrap: wrap;
        gap: 20px;
      }

      .preview-wrap {
        min-height: 360px;
      }

      .small-card {
        display: none;
      }
    }
  
    .preview-page {
      display: none;
      min-height: calc(100vh - 110px);
      background:
        radial-gradient(circle at 25% 30%, rgba(170, 70, 255, 0.45), transparent 30%),
        radial-gradient(circle at 80% 60%, rgba(120, 55, 220, 0.45), transparent 28%),
        linear-gradient(180deg, #170820 0%, #08040f 100%);
    }

    body.preview-open .hero,
    body.preview-open .bottom-tag {
      display: none;
    }

    body.preview-open .preview-page {
      display: block;
    }

    body.preview-open nav a {
      background: transparent;
    }

    body.preview-open nav a.preview-link {
      background: #160027;
      color: white;
    }
  </style>
</head>
<body>
  <div class="top-line"></div>

  <header>
    <div class="logo">E</div>

    <nav>
      <a href="#" class="active" onclick="showHomePage()">Home</a>
      <a href="#preview-page" class="preview-link active" onclick="showPreviewPage()">Preview</a>
    </nav>

    <div class="icons">
      <span>☻</span>
      <span>▣</span>
    </div>
  </header>

  <main class="hero">
    <section>
      <div class="tag"><span>⚡</span> Ego Website</div>

      <h1>
        Ego <span class="purple">On</span><br>
        <span class="purple">Top</span>
      </h1>

      <p class="subtitle">
        Une page moderne avec un style violet, sombre et premium.
        Tu peux modifier le texte, les boutons, le logo, les couleurs et les blocs.
      </p>

      <div class="buttons">
        <a class="btn btn-second" href="https://discord.com/users/1347299015842070621" target="_blank">My Discord</a>
      </div>
    </section>

    <section class="preview-wrap" id="preview">
      <div class="preview clean-preview">
        <video autoplay muted loop playsinline controls style="width:100%; border-radius:20px; border:1px solid rgba(255,255,255,0.1); box-shadow:0 20px 60px rgba(0,0,0,0.5);">
          <source src="videoplayback.mp4" type="video/mp4">
        </video>
      </div>
    </section>
  </main>

  <section class="preview-page" id="preview-page"></section>

  <script>
    function showPreviewPage() {
      document.body.classList.add('preview-open');

      document.querySelectorAll('nav a').forEach(link => {
        link.classList.remove('active');
      });

      document.querySelector('.preview-link').classList.add('active');
    }

    function showHomePage() {
      document.body.classList.remove('preview-open');

      document.querySelectorAll('nav a').forEach(link => {
        link.classList.remove('active');
      });

      document.querySelector('nav a').classList.add('active');
    }

    if (window.location.hash === '#preview-page') {
      showPreviewPage();
    }
  </script>
</body>
</html>
